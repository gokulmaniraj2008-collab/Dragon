<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRYNN — Dragon</title>
<style>
  html, body { margin:0; height:100%; background:#0d0d0f; overflow:hidden; }
  #container { width:100%; height:100vh; }
  #status {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#f4f1ea; font-family:monospace; font-size:13px; letter-spacing:0.2em;
    text-transform:uppercase; pointer-events:none;
  }
  #credit {
    position:absolute; bottom:10px; left:10px; color:rgba(244,241,234,0.4);
    font-family:monospace; font-size:10px; max-width:90vw;
  }
  #credit a { color:rgba(244,241,234,0.6); }
</style>
</head>
<body>
  <div id="container"></div>
  <div id="status">Loading dragon… 0%</div>
  <div id="credit">
    "Tarisland - Dragon (High Poly)" by
    <a href="https://sketchfab.com/doctorA" target="_blank" rel="noopener">Doctor A.</a>
    — CC-BY-4.0
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ---- CONFIG ----
    // Path to scene.gltf relative to this HTML file.
    // Keep scene.bin and the textures/ folder alongside scene.gltf,
    // matching the structure from the original zip.
    const MODEL_URL = './models/dragon/scene.gltf';

    // Pick one of: Qishilong_skill02, Qishilong_skill05, Qishilong_skill06,
    // Qishilong_skill06_dz, Qishilong_skill07, Qishilong_skill08
    // Leave as null to play the first animation found.
    const ANIMATION_NAME = null;
    // ----------------

    const container = document.getElementById('container');
    const statusEl = document.getElementById('status');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0d0d0f);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.6, 4.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(5, 10, 7);
    scene.add(dir);
    const rim = new THREE.DirectionalLight(0x66ccff, 0.4);
    rim.position.set(-5, 2, -5);
    scene.add(rim);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    let mixer;
    const clock = new THREE.Clock();

    const loader = new GLTFLoader();
    loader.load(
      MODEL_URL,
      (gltf) => {
        const model = gltf.scene;

        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.5 / maxDim;
        model.scale.setScalar(scale);
        model.position.sub(center.multiplyScalar(scale));

        scene.add(model);

        if (gltf.animations?.length) {
          console.log('Available clips:', gltf.animations.map(c => c.name));
          mixer = new THREE.AnimationMixer(model);
          const clip = gltf.animations.find(c => c.name === ANIMATION_NAME) || gltf.animations[0];
          mixer.clipAction(clip).play();
        }

        statusEl.style.display = 'none';
      },
      (xhr) => {
        if (xhr.total) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          statusEl.textContent = `Loading dragon… ${pct}%`;
        }
      },
      (err) => {
        console.error('Failed to load model:', err);
        statusEl.textContent = 'Could not load model. Check console.';
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      if (mixer) mixer.update(dt);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
