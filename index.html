<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRYNN — Dragon</title>
<style>
  html, body { margin:0; height:100%; background:#ffffff; overflow:hidden; }
  #container { width:100%; height:100vh; }
  #status {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:#222; font-family:monospace; font-size:13px; letter-spacing:0.2em;
    text-transform:uppercase; pointer-events:none; text-align:center; padding:0 20px;
  }
  #credit {
    position:absolute; bottom:10px; left:10px; color:rgba(0,0,0,0.4);
    font-family:monospace; font-size:10px; max-width:90vw;
  }
  #credit a { color:rgba(0,0,0,0.6); }
</style>
</head>
<body>
  <div id="container"></div>
  <div id="status">Loading dragon… 0%</div>
  <div id="credit">
    "Tarisland - Dragon (High Poly)" by
    <a href="https://sketchfab.com/doctorA" target="_blank" rel="noopener">Doctor A.</a>
    — CC-BY-4.0
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ---- CONFIG ----
    const GLTF_URL = './models/dragon/scene.gltf';
    const ZIP_URL = './models/dragon/tarisland_-_dragon_high_poly.zip';
    const ANIMATION_NAME = null;
    // ----------------

    const container = document.getElementById('container');
    const statusEl = document.getElementById('status');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1.6, 4.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(5, 10, 7);
    scene.add(dir);
    const rim = new THREE.DirectionalLight(0x66ccff, 0.4);
    rim.position.set(-5, 2, -5);
    scene.add(rim);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    let mixer;
    const clock = new THREE.Clock();

    async function loadDragon() {
      statusEl.textContent = 'Downloading dragon data… 0%';
      const res = await fetch(ZIP_URL);
      if (!res.ok) throw new Error(`Failed to fetch ${ZIP_URL} (${res.status})`);

      const total = Number(res.headers.get('content-length')) || 0;
      const reader = res.body.getReader();
      const chunks = [];
      let received = 0;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        if (total) {
          const pct = Math.round((received / total) * 100);
          statusEl.textContent = `Downloading dragon data… ${pct}%`;
        }
      }
      const zipBlob = new Blob(chunks);

      statusEl.textContent = 'Unpacking dragon data…';
      const zip = await JSZip.loadAsync(zipBlob);
      const binEntry = zip.file('scene.bin');
      if (!binEntry) throw new Error('scene.bin not found inside zip');
      const binArrayBuffer = await binEntry.async('arraybuffer');

      const binBlob = new Blob([binArrayBuffer], { type: 'application/octet-stream' });
      const binBlobUrl = URL.createObjectURL(binBlob);

      const manager = new THREE.LoadingManager();
      manager.setURLModifier((url) => {
        if (url.endsWith('scene.bin')) return binBlobUrl;
        return url;
      });

      statusEl.textContent = 'Loading dragon model… 0%';

      const loader = new GLTFLoader(manager);
      loader.load(
        GLTF_URL,
        (gltf) => {
          const model = gltf.scene;

          // The KHR_materials_pbrSpecularGlossiness extension isn't handled
          // by default in this three.js version, so the diffuse textures
          // get dropped. Manually load and apply them here.
          const texLoader = new THREE.TextureLoader(manager);
          const diffuseMaps = {
            'MI_M_B_44_Qishilong_body02_Inst': texLoader.load('./models/dragon/textures/MI_M_B_44_Qishilong_body02_Inst_diffuse.png'),
            'MI_M_B_44_Qishilong_body02_2_Inst': texLoader.load('./models/dragon/textures/MI_M_B_44_Qishilong_body02_2_Inst_diffuse.png'),
          };
          for (const tex of Object.values(diffuseMaps)) {
            tex.colorSpace = THREE.SRGBColorSpace;
            tex.flipY = false;
          }
          model.traverse((node) => {
            if (node.isMesh && node.material) {
              const mats = Array.isArray(node.material) ? node.material : [node.material];
              for (const mat of mats) {
                const map = diffuseMaps[mat.name];
                if (map) {
                  mat.map = map;
                  mat.color.set(0xffffff);
                  mat.needsUpdate = true;
                }
              }
            }
          });


          const box = new THREE.Box3().setFromObject(model);
          const size = box.getSize(new THREE.Vector3());
          const center = box.getCenter(new THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 2.5 / maxDim;
          model.scale.setScalar(scale);
          model.position.sub(center.multiplyScalar(scale));

          scene.add(model);

          if (gltf.animations?.length) {
            console.log('Available clips:', gltf.animations.map(c => c.name));
            mixer = new THREE.AnimationMixer(model);
            const clip = gltf.animations.find(c => c.name === ANIMATION_NAME) || gltf.animations[0];
            mixer.clipAction(clip).play();
          }

          statusEl.style.display = 'none';
        },
        (xhr) => {
          if (xhr.total) {
            const pct = Math.round((xhr.loaded / xhr.total) * 100);
            statusEl.textContent = `Loading dragon model… ${pct}%`;
          }
        },
        (err) => {
          console.error('Failed to load model:', err);
          statusEl.textContent = 'Could not load model. Check console.';
        }
      );
    }

    loadDragon().catch((err) => {
      console.error(err);
      statusEl.textContent = 'Could not load model data. Check console.';
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      if (mixer) mixer.update(dt);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
